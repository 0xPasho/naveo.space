slug: companero-dificil
title: "Coordinando con un compañero difícil"
order: 2
narrativeHook: |
  Sostener una conversación con Vega y con Atlas en su buen día ya lo hiciste.
  Ahora la crew te empieza a mandar a situaciones donde el otro lado no
  coopera de entrada — un output que vino mal, un compañero que se sale del
  rol, una negociación con Forge cuando estima de más. La habilidad nueva:
  no perder el hilo aunque la conversación se complique.
