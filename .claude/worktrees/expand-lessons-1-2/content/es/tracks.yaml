tracks:
  - slug: anatomia-del-prompt
    title: "Anatomía del prompt"
    order: 1
    description: "La crew solo te entiende si sabes cómo hablarles. Aprende el protocolo: cómo estructurar un prompt para que cada compañero responda como esperas — y cómo lograr que el modelo te devuelva exactamente lo que pediste, sin alucinar, sin verborrea, sin romper el formato."
    courses:
      - te-incorporas-a-la-crew
      - entrega-exacta
  - slug: coordinacion-con-la-crew
    title: "Coordinación con la crew"
    order: 2
    description: "Una sola instrucción no siempre alcanza. Aprende a sostener conversaciones multi-turn con miembros de la crew, recuperar outputs que vienen mal, sostener un personaje cuando se le diluye, y negociar con un compañero difícil."
    courses:
      - tu-primera-conversacion
      - companero-dificil
