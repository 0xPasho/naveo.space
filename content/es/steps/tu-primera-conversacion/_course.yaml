slug: tu-primera-conversacion
title: "Tu primera conversación"
order: 1
narrativeHook: |
  Atlas firmó tu primer parte. Ahora la crew te empieza a involucrar en
  cosas reales. y muchas no se resuelven con una sola instrucción.
  Veinticuatro turnos, siete unidades: sostener la conversación,
  conducir el diálogo, recuperarte de fallos, manejar memoria y deriva,
  disciplina de operador, patrones probados, y negociar con autoridad.
  Al cierre, Atlas te firma el segundo parte.
estimatedMinutes: 142
