title: "Te incorporas a la crew"
order: 1
narrativeHook: |
  Vega te recibe a bordo el primer día. Para que el resto de la crew pueda
  contar contigo necesitas aprender a hablarles. Veintiséis rituales, siete
  unidades: anatomía y claridad, forma del input, ejemplos, pedir bien la
  salida, razonar y controlar la voz, debuggear, y endurecer para
  producción. Al final del curso, Atlas firma tu primer parte.
