slug: te-incorporas-a-la-crew
title: "You join the crew"
order: 1
narrativeHook: |
  Vega welcomes you aboard on day one. For the rest of the crew to count
  on you, you need to learn how to talk to them. Twenty-six rituals
  across seven units: anatomy and clarity, input shape, examples, asking
  for the output well, reasoning and controlling the voice, debugging,
  and hardening for production. By the end of the course, Atlas signs
  your first report.
estimatedMinutes: 163
