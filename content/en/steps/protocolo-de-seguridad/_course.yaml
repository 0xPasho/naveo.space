slug: protocolo-de-seguridad
title: "Security protocol"
order: 1
narrativeHook: |
  Atlas pulls you into the security ops room and introduces you to Hex,
  the red-team analyst. The crew has shipped systems that get attacked
  by hostile inputs, by clever users, by data they shouldn't have seen.
  Twenty rituals across six units: classifying incidents, breaking prompt
  injection, hardening data and secrets, scoping destructive tools,
  calibrating hallucination and validating output, red-team and capstone.
  Hex teaches you to break them before the attacker does; Atlas signs
  off at the end.
estimatedMinutes: 150
